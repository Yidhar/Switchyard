[core]
default_provider = "codex"
default_peers = [
    "claude",
    "gemini",
    "codex",
]

[providers.codex]
command = "codex"
args = []
timeout_secs = 0
backend = "codex"

[providers.codex.env]

[providers.antigravity]
command = "agy"
args = []
timeout_secs = 0
backend = "antigravity"

[providers.antigravity.env]

[providers.gemini]
command = "gemini"
args = []
timeout_secs = 0
backend = "gemini"

[providers.gemini.env]

[providers.claude]
command = "claude"
args = []
timeout_secs = 0
backend = "claude"

[providers.claude.env]

[providers.kohaku]
# KohakuTerrarium. Requires a `kt` with headless support (switchyard-headless
# fork) and an installed creature pack (`kt install @kt-biome`).
# args[0] MUST be a creature ref (a config-folder path or `@pkg/creatures/<name>`);
# the adapter appends `--headless --json -p <prompt>`.
command = "kt"
args = ["@kt-biome/creatures/general"]
# Maps to `kt --llm <selector>`. Leave empty to use the creature's own model.
model = "enzi/gpt-5.5-custom"
timeout_secs = 0
backend = "kohaku"

[providers.kohaku.env]

[sandbox]
mode = "danger-full-access"
allowed_paths = []

[session]
directory = '.switchyard\sessions'

[store]
backend = "sqlite"

[ui]
show_diff = true
show_artifacts = true

[orchestrator.worker_retry]
max_attempts = 3
backoff_ms = [
    2000,
    5000,
    10000,
]

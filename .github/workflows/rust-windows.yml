name: rust-windows

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install ruff==0.15.14

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Validate CI workflow contract
        run: python tools/validate_ci_config.py

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets

  package-windows-app:
    name: Package Windows app
    runs-on: windows-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: crates/switchyard-gui/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: crates/switchyard-gui/frontend
        run: npm ci

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build Windows app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/switchyard-gui
          args: --bundles nsis --ci

      - name: Upload Windows app artifact
        uses: actions/upload-artifact@v4
        with:
          name: switchyard-windows-app
          if-no-files-found: error
          path: |
            target/release/bundle/nsis/**
            target/release/switchyard-gui.exe
            crates/switchyard-gui/target/release/bundle/nsis/**
            crates/switchyard-gui/target/release/switchyard-gui.exe

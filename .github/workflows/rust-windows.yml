name: rust-windows

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths-ignore:
      - "README.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "README.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish or update a GitHub Release from this build."
        required: false
        default: false
        type: boolean
      release_tag:
        description: "Manual release tag. Leave blank to create app-<run_number>."
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install ruff==0.15.14

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Validate CI workflow contract
        run: python tools/validate_ci_config.py

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets

  package-windows-app:
    name: Package Windows app
    runs-on: windows-latest
    needs: validate
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: crates/switchyard-gui/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: crates/switchyard-gui/frontend
        run: npm ci

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build Windows app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/switchyard-gui
          args: --bundles nsis --ci

      - name: Upload Windows app artifact
        uses: actions/upload-artifact@v4
        with:
          name: switchyard-windows-app
          if-no-files-found: error
          path: |
            target/release/bundle/nsis/**
            target/release/switchyard-gui.exe
            crates/switchyard-gui/target/release/bundle/nsis/**
            crates/switchyard-gui/target/release/switchyard-gui.exe

      - name: Resolve release tag
        id: release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish_release == 'true'
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
          } else {
            $tag = "${{ github.event.inputs.release_tag }}"
            if ([string]::IsNullOrWhiteSpace($tag)) {
              $tag = "app-${{ github.run_number }}"
            }
          }

          if ($tag -notmatch "^(v|app-)") {
            throw "Release tag must start with 'v' or 'app-'. Got: $tag"
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Collect release assets
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish_release == 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null

          $patterns = @(
            "target/release/bundle/nsis/*.exe",
            "target/release/bundle/nsis/*.msi",
            "target/release/bundle/nsis/*.zip",
            "target/release/switchyard-gui.exe",
            "crates/switchyard-gui/target/release/bundle/nsis/*.exe",
            "crates/switchyard-gui/target/release/bundle/nsis/*.msi",
            "crates/switchyard-gui/target/release/bundle/nsis/*.zip",
            "crates/switchyard-gui/target/release/switchyard-gui.exe"
          )

          $files = @()
          foreach ($pattern in $patterns) {
            $files += Get-ChildItem -Path $pattern -File -ErrorAction SilentlyContinue
          }
          $files = $files | Sort-Object -Property FullName -Unique

          if (-not $files) {
            throw "No release assets found after Tauri build."
          }

          foreach ($file in $files) {
            Copy-Item -Path $file.FullName -Destination (Join-Path "release-assets" $file.Name) -Force
          }

          Push-Location release-assets
          Get-ChildItem -File | ForEach-Object {
            $hash = Get-FileHash -Algorithm SHA256 -Path $_.FullName
            "{0}  {1}" -f $hash.Hash.ToLowerInvariant(), $_.Name
          } | Set-Content -Path SHA256SUMS.txt -Encoding utf8
          Pop-Location

          Get-ChildItem -Path release-assets -File | Format-Table Name, Length

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish_release == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          $title = "Switchyard $env:RELEASE_TAG"
          $notes = @"
          Switchyard desktop App build for $env:RELEASE_TAG.

          Recommended entry point: download and run the Windows desktop App. CLI and TUI remain available for advanced terminal workflows.
          "@
          $notes | Set-Content -Path release-notes.md -Encoding utf8

          $assetPaths = Get-ChildItem -Path release-assets -File | ForEach-Object { $_.FullName }
          if (-not $assetPaths) {
            throw "No release assets to upload."
          }

          if (gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null) {
            gh release edit $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --title $title --notes-file release-notes.md
            gh release upload $env:RELEASE_TAG @assetPaths --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            if ($env:RELEASE_TAG.StartsWith("app-")) {
              gh release create $env:RELEASE_TAG @assetPaths --repo $env:GITHUB_REPOSITORY --target $env:GITHUB_SHA --title $title --notes-file release-notes.md --prerelease
            } else {
              gh release create $env:RELEASE_TAG @assetPaths --repo $env:GITHUB_REPOSITORY --target $env:GITHUB_SHA --title $title --notes-file release-notes.md
            }
          }
